# haunted-manor — theme pack #4 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: haunted-manor
  name: Haunted Manor
  description: A creaking old manor whose restless spirits pay their rent in ectoplasm.
  emoji: "🏚️"
  embed_color: "#5E4B8B"

currencies:
  - id: primary
    name: ectoplasm
    description: Luminous spectral residue, skimmed nightly from the manor's cold spots.
    emoji: "🌫️"
  - id: prestige
    name: restless spirits
    description: Freed phantoms who owe you a favor — proof of manors settled and hauntings outgrown.
    emoji: "👻"

generators:
  - id: tier1
    name: haunted portrait
    description: A portrait whose eyes follow you around the room, weeping a slow trickle of ectoplasm.
    emoji: "🖼️"
    produces: primary
    base_rate: 1
  - id: tier2
    name: poltergeist parlor
    description: A parlor of furniture-flinging poltergeists; all that racket condenses into ectoplasm.
    emoji: "🪑"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: midnight candles
    description: Candles lit at exactly midnight; the portrait broods harder and weeps faster.
    emoji: "🕯️"
    target: tier1
  - id: boost2
    name: creakier floorboards
    description: Loosened floorboards give the poltergeists more to slam; the parlor's output rattles upward.
    emoji: "🪵"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: hold a séance
  action_description: Gather the household for one last séance and set every spirit free — they remember you kindly.
  action_emoji: "📿"

labels:
  offline_return: "While you were away, the spirits kept seeping: {gains}"
  status_title: "🏚️ Haunted Manor — the night ledger"
  shop_title: "🕯️ The Séance Supply Cabinet"
  shop_description: Spend ectoplasm to make the haunting that little bit worse.
  level: Haunting level
  prestige_progress: "lifetime ectoplasm toward the séance:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first haunting
    description: Ten spectres stirring at once — the manor finally earns the word haunted.
    emoji: "🖼️"
  - id: owned-2
    name: restless household
    description: A hundred spectres at work; no guest ever makes it past the foyer.
    emoji: "🕸️"
  - id: owned-3
    name: manor of a thousand ghosts
    description: A thousand spectres — the house holds more dead than the town holds living.
    emoji: "🏰"
  - id: lifetime-1
    name: first thousand drops
    description: A thousand drops of ectoplasm skimmed from the cold spots and bottled.
    emoji: "🌫️"
  - id: lifetime-2
    name: spectral fortune
    description: A hundred thousand drops; the cellar glows faintly up through the floorboards.
    emoji: "🎖️"
  - id: lifetime-3
    name: legend of the manor
    description: Ten million drops of ectoplasm. Ghost-hunters retire rather than knock.
    emoji: "👑"
  - id: prestige-1
    name: first freed spirit
    description: One restless spirit set free — and grateful enough now to owe you a favor.
    emoji: "👻"
  - id: prestige-2
    name: grateful dead
    description: Five freed spirits, each drifting back on cold nights to lend a colder hand.
    emoji: "💀"
  - id: prestige-3
    name: master of séances
    description: Twenty-five freed spirits — the veil parts for you like a held-open door.
    emoji: "📿"
