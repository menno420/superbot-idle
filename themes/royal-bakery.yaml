# royal-bakery — theme pack #8 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: royal-bakery
  name: Royal Bakery
  description: A flour-dusted bakehouse by appointment to the crown, where the ovens never cool and the queue never ends.
  emoji: "🥐"
  embed_color: "#D98E32"

currencies:
  - id: primary
    name: pastries
    description: Flaky, still-warm pastries — the bakehouse's daily bread and the kingdom's weakness.
    emoji: "🥐"
  - id: prestige
    name: royal seals
    description: Wax seals of royal favor, one per bakehouse chartered — proof of franchises founded and crowns fed.
    emoji: "👑"

generators:
  - id: tier1
    name: sourdough starter
    description: A century-old starter, bubbling in its crock; feed it and it repays the bakehouse without rest.
    emoji: "🫙"
    produces: primary
    base_rate: 1
  - id: tier2
    name: brick oven
    description: A great brick oven with a hearth like a midsummer noon; batch after batch, it never cools.
    emoji: "🧱"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: stone-ground flour
    description: Finer flour from the old mill; the starter rises faster and the crumb turns cloud-light.
    emoji: "🌾"
    target: tier1
  - id: boost2
    name: twin hearth doors
    description: A second door on the hearth; loaves go in as loaves come out, and the oven never waits.
    emoji: "🚪"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: open a new royal franchise
  action_description: Hand the keys to your best baker, take the crown's charter, and raise a new bakehouse in a new town — with royal seals to your name.
  action_emoji: "🏰"

labels:
  offline_return: "While you were away from the counter, the ovens never cooled: {gains}"
  status_title: "🥐 Royal Bakery — the morning proof"
  shop_title: "🧾 The Pantry Ledger"
  shop_description: Trade pastries for a warmer, busier bakehouse.
  level: Recipe mastery
  prestige_progress: "lifetime pastries toward the charter:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first hearth lit
    description: Ten ovens firing at once — the bakehouse finally fills with the good noise.
    emoji: "🔥"
  - id: owned-2
    name: guild bakehouse
    description: A hundred ovens going; the morning queue winds clear around the square.
    emoji: "🥐"
  - id: owned-3
    name: royal bakery empire
    description: A thousand ovens — every town of note eats your crust by royal charter.
    emoji: "🏰"
  - id: lifetime-1
    name: first thousand pastries
    description: The first thousand pastries out of the oven, counted warm onto the cooling racks.
    emoji: "🥐"
  - id: lifetime-2
    name: by appointment to the crown
    description: A hundred thousand pastries; the palace now orders by the cartload.
    emoji: "🎖️"
  - id: lifetime-3
    name: legend of the ovens
    description: Ten million pastries. Rival bakers make pilgrimages just to smell the air.
    emoji: "👑"
  - id: prestige-1
    name: first royal seal
    description: The first wax seal of royal favor — one bakehouse chartered and thriving.
    emoji: "👑"
  - id: prestige-2
    name: sealed charters
    description: Five royal seals in the strongbox, one per bakehouse founded and fed.
    emoji: "📜"
  - id: prestige-3
    name: baker to the realm
    description: Twenty-five royal seals — the crown sets its table by your calendar.
    emoji: "🏰"
