# idol-agency — theme pack #12 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: idol-agency
  name: Idol Agency
  description: A scrappy talent agency turning midnight practice and shaky livestreams into stadium-filling stardom.
  emoji: "🎤"
  embed_color: "#E75480"

currencies:
  - id: primary
    name: fans
    description: Devoted fans won one wave, one wink, one encore at a time — the only number that matters.
    emoji: "💖"
  - id: prestige
    name: platinum records
    description: Framed platinum records on the agency wall — the shine of every fandom you ever built from zero.
    emoji: "💿"

generators:
  - id: tier1
    name: practice room
    description: A mirror-walled practice room where trainees drill choreography until the squeak of sneakers becomes a fandom.
    emoji: "🩰"
    produces: primary
    base_rate: 1
  - id: tier2
    name: livestream studio
    description: A ring-lit livestream studio pumping out variety clips; the chat scrolls too fast to read.
    emoji: "📡"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: guest choreography coach
    description: A legendary coach tightens every eight-count; the practice room turns polish into devotion.
    emoji: "🩷"
    target: tier1
  - id: boost2
    name: viral fancam edit
    description: One perfectly timed fancam edit and the algorithm falls in love; the studio's numbers go vertical.
    emoji: "🎬"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: graduate and debut a new group
  action_description: Hold the tearful graduation concert, hang the platinum record, and audition a brand-new lineup — the agency's next era starts tonight.
  action_emoji: "🎓"

labels:
  offline_return: "While you were offstage, the fandom kept the lightsticks waving: {gains}"
  status_title: "🎤 Idol Agency — the fandom report"
  shop_title: "💿 The Producer's Desk"
  shop_description: Spend fan devotion on polish, practice, and a little stage magic.
  level: Spotlight level
  prestige_progress: "lifetime fans toward the graduation stage:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first fandom
    description: Ten acts drilling at once — the agency finally sounds like a hit factory.
    emoji: "🩰"
  - id: owned-2
    name: chart-topping roster
    description: A hundred acts in rotation; the trending page is basically your roster.
    emoji: "🎶"
  - id: owned-3
    name: entertainment empire
    description: A thousand acts — every stadium in the country books through your desk.
    emoji: "🏙️"
  - id: lifetime-1
    name: first thousand fans
    description: The first thousand fans, won one encore and one shaky livestream at a time.
    emoji: "💖"
  - id: lifetime-2
    name: sold-out arenas
    description: A hundred thousand fans; the lightstick ocean stretches past the nosebleeds.
    emoji: "🎟️"
  - id: lifetime-3
    name: household name
    description: Ten million fans. Your groups trend before they have even announced.
    emoji: "👑"
  - id: prestige-1
    name: first platinum record
    description: The first platinum record on the wall — a fandom built up from absolute zero.
    emoji: "💿"
  - id: prestige-2
    name: platinum wall
    description: Five platinum records framed in a row; new trainees photograph them for luck.
    emoji: "🏆"
  - id: prestige-3
    name: hall of fame
    description: Twenty-five platinum records — the industry names its trophies after your eras.
    emoji: "🌟"
