# pirate-cove — theme pack #10 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: pirate-cove
  name: Pirate Cove
  description: A hidden smugglers' cove where every tide brings in doubloons and nobody asks where they came from.
  emoji: "🏴‍☠️"
  embed_color: "#16A085"

currencies:
  - id: primary
    name: doubloons
    description: Salt-crusted gold doubloons, counted twice and trusted never.
    emoji: "🪙"
  - id: prestige
    name: cursed relics
    description: Trinkets from ships that should have stayed sunk — proof of hoards buried and horizons chased.
    emoji: "⚱️"

generators:
  - id: tier1
    name: smuggler skiff
    description: A low-slung skiff that slips past the customs sloop with a hold full of doubloons.
    emoji: "🛶"
    produces: primary
    base_rate: 1
  - id: tier2
    name: tavern crew
    description: A rowdy tavern crew that fleeces every sailor foolish enough to play dice with pirates.
    emoji: "🍻"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: patched black sails
    description: New sailcloth dyed midnight black; the skiff runs faster and the customs sloop sees nothing.
    emoji: "⛵"
    target: tier1
  - id: boost2
    name: double rum rations
    description: Twice the rum makes the crew twice as charming; the dice keep landing the cove's way.
    emoji: "🥃"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: bury the treasure and set sail
  action_description: Sink the chest beneath the palm, burn the map into memory, and chase a fresh horizon — the sea remembers your legend.
  action_emoji: "🗺️"

labels:
  offline_return: "While ye were ashore, the tide kept the smugglers busy: {gains}"
  status_title: "🏴‍☠️ Pirate Cove — the captain's ledger"
  shop_title: "⚓ The Quartermaster's Stores"
  shop_description: Spend doubloons to keep the skiffs swift and the crew wicked.
  level: Infamy level
  prestige_progress: "lifetime doubloons toward the buried chest:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first fleet
    description: Ten crews working the tide at once — the cove finally sounds like a pirate haven.
    emoji: "🛶"
  - id: owned-2
    name: smuggler's flotilla
    description: A hundred crews on the water; the customs sloop stops leaving harbor at all.
    emoji: "⛵"
  - id: owned-3
    name: scourge of the coast
    description: A thousand crews — every port on the map flies your flag or fears it.
    emoji: "🏴‍☠️"
  - id: lifetime-1
    name: first thousand doubloons
    description: A thousand doubloons counted twice, trusted never, and buried once for luck.
    emoji: "🪙"
  - id: lifetime-2
    name: captain's fortune
    description: A hundred thousand doubloons; the hold rides low and the crew grins wide.
    emoji: "💰"
  - id: lifetime-3
    name: legend of the seas
    description: Ten million doubloons. Navies name their worst storms after your worst nights.
    emoji: "👑"
  - id: prestige-1
    name: first cursed relic
    description: One cursed relic in the chest — off a ship that should have stayed sunk.
    emoji: "⚱️"
  - id: prestige-2
    name: cursed reliquary
    description: Five cursed relics, humming in the dark, best not counted after midnight.
    emoji: "💀"
  - id: prestige-3
    name: ghost of the horizon
    description: Twenty-five relics — the sea itself carries rumors of where you'll strike next.
    emoji: "🗺️"
