# egg-farm — flagship default theme pack (data only; validated by theme-gate
# against docs/theme-schema.md / schema/theme.schema.json)
schema_version: 1

theme:
  id: egg-farm
  name: Egg Farm
  description: A cozy backyard farm where patient chickens fund your empire.
  emoji: "🥚"
  embed_color: "#F5C542"

currencies:
  - id: primary
    name: eggs
    description: Fresh eggs, the farm's lifeblood.
    emoji: "🥚"
  - id: prestige
    name: golden eggs
    description: Gleaming golden eggs — proof of farms sold and fortunes past.
    emoji: "🥇"

generators:
  - id: tier1
    name: chicken coop
    description: A humble coop; each hen lays with metronomic dedication.
    emoji: "🐔"
    produces: primary
    base_rate: 1

upgrades:
  - id: boost1
    name: bigger henhouse
    description: A roomier henhouse; every hen in the coop lays that bit faster.
    emoji: "🏠"
    target: tier1

prestige:
  currency: prestige
  measures: primary
  action_name: sell the farm
  action_description: Sell the whole farm and start over with golden eggs in hand.
  action_emoji: "🌟"

labels:
  offline_return: "While you were away, the hens kept laying: {gains}"
  status_title: "🥚 Egg Farm — the morning count"
  shop_title: "🧺 The Farm Supply Shed"
  shop_description: Trade fresh eggs for a busier, happier farm.
  level: Coop size
  prestige_progress: "lifetime eggs toward the sale:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first flock
    description: Ten hens settled on the roost — the yard finally clucks and rustles like a real farm at dawn.
    emoji: "🐣"
  - id: owned-2
    name: hundred-hen farmstead
    description: A hundred hens strong; the feed bill keeps its own ledger now and the baskets never quite empty.
    emoji: "🐥"
  - id: owned-3
    name: poultry empire
    description: A thousand hens — three counties over, farmers set their clocks by your morning chorus.
    emoji: "🏆"
  - id: lifetime-1
    name: first thousand eggs
    description: The first thousand eggs of the season, wiped clean, counted twice, and crated for the early market.
    emoji: "🧺"
  - id: lifetime-2
    name: county-fair famous
    description: A hundred thousand eggs — the county fair pins your blue ribbon before the judging even begins.
    emoji: "🎖️"
  - id: lifetime-3
    name: ten-million-egg legend
    description: Ten million eggs. Bakers name their pastries after you, and the omelettes have grown legion.
    emoji: "👑"
  - id: prestige-1
    name: first golden egg
    description: The first farm sold and handed on — one golden egg, still warm in your palm.
    emoji: "🥇"
  - id: prestige-2
    name: golden clutch
    description: Five golden eggs nested together — a retirement fund that gleams a little every time you check on it.
    emoji: "💰"
  - id: prestige-3
    name: golden dynasty
    description: Twenty-five golden eggs — a whole dynasty measured out in farms raised, sold, and quietly remembered.
    emoji: "🌟"
