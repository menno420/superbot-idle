# dragon-hoard — theme pack #6 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: dragon-hoard
  name: Dragon Hoard
  description: You are the dragon. The hoard must grow.
  emoji: "🐉"
  embed_color: "#B8860B"

currencies:
  - id: primary
    name: gold coins
    description: Warm coins to sleep on — a proper hoard is measured one gleaming coin at a time.
    emoji: "🪙"
  - id: prestige
    name: ancient scales
    description: Iridescent scales shed at each rebirth — proof of hoards burned and skies reclaimed.
    emoji: "🐲"

generators:
  - id: tier1
    name: kobold miner
    description: A devoted kobold who tithes every coin it digs straight into the hoard.
    emoji: "⛏️"
    produces: primary
    base_rate: 1
  - id: tier2
    name: tribute village
    description: A village that pays its protection in gleaming coin, promptly and without being asked twice.
    emoji: "🏘️"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: sharper pickaxes
    description: Sharper pickaxes for the kobold crews; the coin seams give up their riches faster.
    emoji: "⚒️"
    target: tier1
  - id: boost2
    name: wings over the rooftops
    description: One slow circle over the rooftops and the village discovers a deeper well of gratitude.
    emoji: "🌥️"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: burn it all and fly on
  action_description: Torch the lair, scatter the hoard to the winds, and fly for new mountains — nothing teaches like beginning again with ancient scales.
  action_emoji: "🔥"

labels:
  offline_return: "While you slumbered, the tribute kept piling up: {gains}"
  status_title: "🐉 Dragon Hoard — a dragon's accounting"
  shop_title: "🔥 The Dragon's Demands"
  shop_description: Spend coins now to make the hoard grow faster. It is an investment.
  level: Menace level
  prestige_progress: "lifetime gold toward the burning:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first coin seam
    description: Ten earners toiling at once — the pile is finally deep enough to sleep on.
    emoji: "⛏️"
  - id: owned-2
    name: hundred-earner hoard
    description: A hundred earners digging and tithing below; the mountain hums with your wealth.
    emoji: "🏔️"
  - id: owned-3
    name: hoard of legend
    description: A thousand earners — knights write their wills before they ride out for you.
    emoji: "🐉"
  - id: lifetime-1
    name: first thousand coins
    description: A thousand coins counted onto the pile, each one warm and gleaming and yours.
    emoji: "🪙"
  - id: lifetime-2
    name: gleaming fortune
    description: A hundred thousand coins; the hoard is large enough to have its own weather.
    emoji: "💰"
  - id: lifetime-3
    name: wealth beyond song
    description: Ten million coins. Bards run out of adjectives and simply start again.
    emoji: "👑"
  - id: prestige-1
    name: first ancient scale
    description: One iridescent scale shed at the first rebirth — you fly on, older and wiser.
    emoji: "🐲"
  - id: prestige-2
    name: scaled reserve
    description: Five ancient scales, each the memory of a hoard you dared to burn.
    emoji: "✨"
  - id: prestige-3
    name: elder wyrm
    description: Twenty-five scales — the eldest dragons speak your name in the high cold air.
    emoji: "👑"
