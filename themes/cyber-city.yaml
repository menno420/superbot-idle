# cyber-city — theme pack #9 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: cyber-city
  name: Cyber City
  description: A rain-slick sprawl of neon and antennae where everything is for sale and the skyline never sleeps.
  emoji: "🌆"
  embed_color: "#00C2D1"

currencies:
  - id: primary
    name: credits
    description: Untraceable credits, streamed in from a thousand shadow contracts — the city's only true language.
    emoji: "💳"
  - id: prestige
    name: legacy code fragments
    description: Fragments of pre-collapse code, priceless and unreadable — proof of minds uploaded and grids outlived.
    emoji: "💾"

generators:
  - id: tier1
    name: data haven
    description: A cold vault of humming racks below the flood line; it rents secrecy by the millisecond.
    emoji: "🗄️"
    produces: primary
    base_rate: 1
  - id: tier2
    name: courier drone swarm
    description: A glittering swarm threading the towers with parcels no one signs for; every drop pays in credits.
    emoji: "🛸"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: cryo-coolant overclock
    description: Supercooled coolant lets the haven's racks run red-line all night without a single thermal stall.
    emoji: "🧊"
    target: tier1
  - id: boost2
    name: swarm routing firmware
    description: Black-market pathing firmware; the swarm stops circling the towers and starts threading them.
    emoji: "📶"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: upload your consciousness
  action_description: Burn the safehouses, wipe the ledgers, and pour yourself into the grid — you wake in a new body with legacy code fragments etched behind your eyes.
  action_emoji: "🧠"

labels:
  offline_return: "While you were jacked out, the city kept streaming credits: {gains}"
  status_title: "🌆 Cyber City — skyline uplink"
  shop_title: "🛠️ The Night Market Node"
  shop_description: Burn credits on gear that keeps the grid paying you first.
  level: Firmware rev
  prestige_progress: "lifetime credits toward the upload:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first node cluster
    description: Ten data havens online at once — the block finally shows up on the grid map.
    emoji: "🗄️"
  - id: owned-2
    name: district uplink
    description: A hundred installations humming; the district reroutes its traffic through you.
    emoji: "🌆"
  - id: owned-3
    name: citywide grid
    description: A thousand installations — the whole rain-slick sprawl runs on your dark fiber now.
    emoji: "🛰️"
  - id: lifetime-1
    name: first thousand credits
    description: The first clean thousand credits, laundered through accounts that don't exist.
    emoji: "💳"
  - id: lifetime-2
    name: shadow fortune
    description: A hundred thousand credits routed so far into the dark they cast no ledger shadow.
    emoji: "💰"
  - id: lifetime-3
    name: grid legend
    description: Ten million credits. The old syndicates study your ledgers like scripture.
    emoji: "👑"
  - id: prestige-1
    name: first code fragment
    description: One legacy code fragment recovered — proof a mind once outlived its body.
    emoji: "💾"
  - id: prestige-2
    name: fragment cache
    description: Five fragments of pre-collapse code, archived behind ice no ice can reach.
    emoji: "🧬"
  - id: prestige-3
    name: ascended intelligence
    description: Twenty-five fragments — you no longer log into the grid; you are the grid.
    emoji: "🧠"
