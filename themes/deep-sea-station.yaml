# deep-sea-station — theme pack #5 (data only; validated by theme-gate against
# docs/theme-schema.md / schema/theme.schema.json). Skins the SAME opaque
# engine ids as the rest of the catalog (primary/prestige, tier1/tier2,
# boost1/boost2): identical mechanics, different world.
schema_version: 1

theme:
  id: deep-sea-station
  name: Deep-Sea Station
  description: A pressurized research outpost on the trench floor, harvesting the abyss one pearl at a time.
  emoji: "🌊"
  embed_color: "#0B6E8C"

currencies:
  - id: primary
    name: pearls
    description: Trench pearls, luminous and flawless — the abyss pays its debts in beauty.
    emoji: "🦪"
  - id: prestige
    name: abyssal relics
    description: Strange relics dredged from the trench floor — proof of depths survived and voyages home.
    emoji: "🏺"

generators:
  - id: tier1
    name: oyster bed
    description: A cultivated bed of trench oysters, each one patiently coating grit into pearls.
    emoji: "🐚"
    produces: primary
    base_rate: 1
  - id: tier2
    name: submersible drone
    description: A tireless drone that combs the kelp forests and vent fields for wild pearls.
    emoji: "🤖"
    produces: primary
    base_rate: 5

upgrades:
  - id: boost1
    name: plankton drip line
    description: A steady drip of rich plankton keeps every oyster fat, content, and productive.
    emoji: "🦠"
    target: tier1
  - id: boost2
    name: sonar trench maps
    description: Fine-grained sonar charts of the trench; the drone stops searching and starts harvesting.
    emoji: "📡"
    target: tier2

prestige:
  currency: prestige
  measures: primary
  action_name: surface and resupply
  action_description: Blow the ballast, ride up into the light, and refit — you return to the deep with abyssal relics in the hold.
  action_emoji: "⚓"

labels:
  offline_return: "While you were topside, the abyss kept providing: {gains}"
  status_title: "🌊 Deep-Sea Station — pressure-hull report"
  shop_title: "⚙️ Station Stores"
  shop_description: Trade pearls for gear that keeps the harvest coming.
  level: Depth rating
  prestige_progress: "lifetime pearls toward the surface run:"

# Noun skins for the ENGINE-DERIVED milestone slots (thresholds/bonuses are
# engine-side, pre-registered in docs/design/achievements-v0.md).
milestones:
  - id: owned-1
    name: first oyster bed
    description: Ten harvesters working at once — the station stops feeling so alone down here.
    emoji: "🐚"
  - id: owned-2
    name: trench operation
    description: A hundred harvesters combing the dark; the survey charts fill with your marks.
    emoji: "🌊"
  - id: owned-3
    name: abyssal enterprise
    description: A thousand harvesters — the whole trench floor answers to the station now.
    emoji: "🏙️"
  - id: lifetime-1
    name: first thousand pearls
    description: A thousand pearls in the vault, each one prised from the crushing dark.
    emoji: "🦪"
  - id: lifetime-2
    name: pearl fortune
    description: A hundred thousand pearls; surface buyers send submarines just to bid.
    emoji: "💎"
  - id: lifetime-3
    name: legend of the deep
    description: Ten million pearls. Sailors swear the trench still glows where you dredged it.
    emoji: "👑"
  - id: prestige-1
    name: first relic
    description: One abyssal relic in the hold — something down there was here long before us.
    emoji: "🏺"
  - id: prestige-2
    name: relic vault
    description: Five relics dredged from the black, older than any chart aboard.
    emoji: "🗿"
  - id: prestige-3
    name: keeper of the abyss
    description: Twenty-five relics — you read the trench's silences like a logbook.
    emoji: "🌀"
